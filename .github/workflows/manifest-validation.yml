name: Manifest Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/main/resources/**/*.mustache'
      - 'policies/**/*.rego'
      - '.kube-linter.yaml'
      - 'scripts/validation/**'
      - '.github/workflows/manifest-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'src/main/resources/**/*.mustache'
      - 'policies/**/*.rego'
      - '.kube-linter.yaml'
      - 'scripts/validation/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to validate'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - dev

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  KUBECONFORM_VERSION: '0.6.4'
  KUBE_LINTER_VERSION: '0.6.8'
  PLUTO_VERSION: '5.19.4'
  CONFTEST_VERSION: '0.54.0'

jobs:
  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        kubernetes_version: ['1.35.0', '1.36.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.4'

      - name: Cache validation tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/.local/bin
          key: validation-tools-${{ runner.os }}-kubeconform-${{ env.KUBECONFORM_VERSION }}-kube-linter-${{ env.KUBE_LINTER_VERSION }}-pluto-${{ env.PLUTO_VERSION }}-conftest-${{ env.CONFTEST_VERSION }}

      - name: Install validation tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin

          # Install kubeconform
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz -C ~/.local/bin kubeconform

          # Install kube-linter
          curl -sL "https://github.com/stackrox/kube-linter/releases/download/v${KUBE_LINTER_VERSION}/kube-linter-linux_amd64.tar.gz" | tar xz -C ~/.local/bin kube-linter

          # Install pluto
          curl -sL "https://github.com/FairwindsOps/pluto/releases/download/v${PLUTO_VERSION}/pluto_${PLUTO_VERSION}_linux_amd64.tar.gz" | tar xz -C ~/.local/bin pluto

          # Install conftest
          curl -sL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" | tar xz -C ~/.local/bin conftest

          chmod +x ~/.local/bin/*

      - name: Add tools to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          kubeconform -v
          kube-linter version
          pluto version
          conftest --version

      - name: Update Helm repositories
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo add eks https://aws.github.io/eks-charts
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
          helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo add stakater https://stakater.github.io/stakater-charts
          helm repo add kyverno https://kyverno.github.io/kyverno
          helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts
          helm repo add fairwinds https://charts.fairwinds.com/stable
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Render Helm charts
        run: |
          chmod +x scripts/validation/*.sh
          scripts/validation/render-helm.sh ${{ github.event.inputs.environment || 'production' }}

      - name: Run kubeconform (K8s ${{ matrix.kubernetes_version }})
        id: kubeconform
        continue-on-error: true
        run: |
          echo "## kubeconform Results (K8s ${{ matrix.kubernetes_version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SKIP_KINDS="Certificate,ClusterIssuer,Issuer,NodePool,EC2NodeClass,ClusterPolicy,Policy,ClusterSecretStore,SecretStore,ExternalSecret,VeleroSchedule,BackupStorageLocation,VolumeSnapshotLocation,ServiceMonitor,PodMonitor,PrometheusRule"

          if kubeconform -kubernetes-version ${{ matrix.kubernetes_version }} -strict -summary -ignore-missing-schemas -skip "${SKIP_KINDS}" target/rendered-manifests/*.yaml 2>&1 | tee /tmp/kubeconform.txt; then
            echo "✅ Schema validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Schema validation failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/kubeconform.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Run kube-linter
        id: kube-linter
        if: matrix.kubernetes_version == '1.35.0'  # Only run once
        continue-on-error: true
        run: |
          echo "## kube-linter Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if kube-linter lint --config .kube-linter.yaml target/rendered-manifests/ 2>&1 | tee /tmp/kube-linter.txt; then
            echo "✅ Best practices check passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Best practices issues found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -100 /tmp/kube-linter.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Run kube-linter (SARIF)
        if: matrix.kubernetes_version == '1.35.0'  # Only run once
        continue-on-error: true
        run: |
          kube-linter lint --config .kube-linter.yaml --format sarif target/rendered-manifests/ > kube-linter-results.sarif || true

      - name: Upload kube-linter SARIF
        if: matrix.kubernetes_version == '1.35.0'
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: kube-linter-results.sarif
          category: kube-linter

      - name: Run pluto (K8s ${{ matrix.kubernetes_version }})
        id: pluto
        continue-on-error: true
        run: |
          echo "## pluto Results (K8s ${{ matrix.kubernetes_version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if pluto detect-files --target-versions k8s=v${{ matrix.kubernetes_version }} --output wide --directory target/rendered-manifests/ 2>&1 | tee /tmp/pluto.txt; then
            echo "✅ No deprecated/removed APIs" >> $GITHUB_STEP_SUMMARY
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ]; then
              echo "⚠️ Deprecated APIs found (not blocking)" >> $GITHUB_STEP_SUMMARY
            elif [ $EXIT_CODE -eq 3 ]; then
              echo "❌ Removed APIs found" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/pluto.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run conftest policy tests
        if: matrix.kubernetes_version == '1.35.0'  # Only run once
        continue-on-error: true
        run: |
          echo "## Policy Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if conftest verify --policy policies/ 2>&1 | tee /tmp/conftest-verify.txt; then
            echo "✅ Policy unit tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Policy unit tests failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/conftest-verify.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run conftest policy validation
        id: conftest
        if: matrix.kubernetes_version == '1.35.0'  # Only run once
        continue-on-error: true
        run: |
          echo "## Policy Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          for manifest in target/rendered-manifests/*.yaml; do
            if ! conftest test --policy policies/ "${manifest}" 2>&1; then
              FAILED=1
            fi
          done | tee /tmp/conftest.txt

          if [ $FAILED -eq 0 ]; then
            echo "✅ Policy validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Policy validation failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(FAIL|WARN)" /tmp/conftest.txt | head -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload rendered manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manifests-k8s-${{ matrix.kubernetes_version }}
          path: target/rendered-manifests/
          retention-days: 7

      - name: Check validation results
        if: always()
        run: |
          if [[ "${{ steps.kubeconform.outcome }}" == "failure" ]] || \
             [[ "${{ steps.kube-linter.outcome }}" == "failure" ]] || \
             [[ "${{ steps.pluto.outcome }}" == "failure" ]] || \
             [[ "${{ steps.conftest.outcome }}" == "failure" ]]; then
            echo "::error::One or more validations failed"
            exit 1
          fi

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: validate-manifests
    if: always()

    steps:
      - name: Check validation status
        run: |
          if [[ "${{ needs.validate-manifests.result }}" == "failure" ]]; then
            echo "::error::Manifest validation failed"
            exit 1
          fi
          echo "✅ All manifest validations passed"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ needs.validate-manifests.result }}' === 'success' ? '✅' : '❌';
            const body = `## ${status} Manifest Validation

            | Check | K8s 1.35 | K8s 1.36 |
            |-------|----------|----------|
            | Schema (kubeconform) | ${status} | ${status} |
            | Best Practices (kube-linter) | ${status} | - |
            | API Deprecations (pluto) | ${status} | ${status} |
            | Security Policies (conftest) | ${status} | - |

            See the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Manifest Validation')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
